<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Гра для Андрія</title>
    <style>
        :root { 
            --blue: #4da6ff; --dark-blue: #004d99; --yellow: #ffcc00; 
            --red: #ff4d4d; --green: #2ecc71; --sand: #f0e4d0; 
        }
        body { margin: 0; font-family: 'Arial Rounded MT Bold', sans-serif; overflow: hidden; background: #eef9ff; }
        
        #controls-panel {
            position: fixed; top: 10px; right: 20px; z-index: 1000;
            background: rgba(255,255,255,0.9); padding: 12px; border-radius: 20px;
            display: flex; flex-direction: column; gap: 10px; border: 3px solid var(--dark-blue);
        }
        .ctrl-row { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--dark-blue); font-weight: bold; }
        #volume-music, #volume-voice { cursor: pointer; width: 80px; }
        
        #btn-pause {
            padding: 8px; font-size: 18px; cursor: pointer; border-radius: 10px;
            border: none; background: var(--yellow); color: var(--dark-blue); font-weight: bold;
            box-shadow: 0 3px 0 #b89600;
        }
        #btn-pause.paused { background: var(--green); color: white; box-shadow: 0 3px 0 #1e8449; }

        #library { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 30px; height: 100vh; box-sizing: border-box; overflow-y: auto; }
        .category-card { border-radius: 25px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; font-size: 22px; color: var(--dark-blue); border: 5px solid var(--dark-blue); box-shadow: 0 8px 0 rgba(0,0,0,0.1); height: 160px; text-align: center; font-weight: bold; }
        .category-card span { font-size: 50px; margin-bottom: 10px; }
        .locked { opacity: 0.4; cursor: default; filter: grayscale(0.5); }

        #game-screen { display: none; width: 100vw; height: 100vh; background: var(--blue); position: relative; flex-direction: column; justify-content: center; align-items: center; }
        #word-display { display: flex; gap: 15px; z-index: 10; flex-wrap: wrap; justify-content: center; }
        .tile { width: 130px; height: 170px; background: var(--sand); border-radius: 25px; display: flex; justify-content: center; align-items: center; font-size: 100px; font-weight: bold; color: var(--dark-blue); border: 5px solid var(--dark-blue); box-shadow: 0 10px 0 #cbdadb; text-transform: uppercase; }
        
        .active { background: var(--yellow); border-color: #f39c12; animation: breathe 1s infinite alternate; }
        .game-paused .active { animation-play-state: paused; }
        
        .correct { background: var(--green); color: #fff; border-color: #27ae60; }
        .error { background: var(--red) !important; animation: shake 0.3s; color: #fff; }

        @keyframes breathe { from { transform: scale(1); } to { transform: scale(1.1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }

        #prize-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; flex-direction: column; justify-content: center; align-items: center; background: #000; }
        #prize-bg { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(35px) brightness(0.5); z-index: -1; }
        #prize-title { position: absolute; top: 40px; color: #fff; font-size: 60px; text-transform: uppercase; z-index: 10; }
        #prize-img { max-width: 90%; max-height: 75%; border: 10px solid #fff; border-radius: 20px; z-index: 5; object-fit: contain; }
        .btn-next { margin-top: 25px; padding: 25px 50px; font-size: 32px; background: var(--green); color: #fff; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; display: none; }

        #final-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 500; overflow: hidden; flex-direction: column; justify-content: center; align-items: center; }
        .fw { position: absolute; border-radius: 50%; opacity: 0; pointer-events: none; }
        .final-text { color: var(--yellow); font-size: 100px; text-align: center; text-shadow: 0 0 30px #ffcc00; margin-bottom: 60px; z-index: 600; font-weight: bold; }
        .final-btn { padding: 25px 60px; font-size: 35px; background: var(--yellow); border: none; border-radius: 25px; cursor: pointer; font-weight: bold; z-index: 600; box-shadow: 0 10px 0 #b89600; }
    </style>
</head>
<body>

<div id="controls-panel">
    <div class="ctrl-row">🎵 <input type="range" id="volume-music" min="0" max="1" step="0.1" value="0.2"></div>
    <div class="ctrl-row">🗣️ <input type="range" id="volume-voice" min="0" max="1" step="0.1" value="1"></div>
    <button id="btn-pause" onclick="togglePause()">ПАУЗА</button>
</div>

<div id="library"></div>
<div id="game-screen"></div>

<div id="prize-overlay">
    <div id="prize-bg"></div>
    <div id="prize-title"></div>
    <img id="prize-img" src="">
    <button id="btn-space" class="btn-next" onclick="nextAction()">ПРОБІЛ - далі ➔</button>
</div>

<div id="final-screen">
    <div class="final-text">ТИ МОЛОДЕЦЬ!</div>
    <button class="final-btn" onclick="location.reload()">В БІБЛІОТЕКУ</button>
</div>

<script>
const categories = [
    { n: "Тварини", e: "🐾", c: "#FFadad", words: ["БІЛКА","ВЕДМІДЬ","ВІВЦЯ","ВІСЛЮК","ВОВК","ГОЛУБ","ГУСАК","ДЕЛЬФІН","ЖАБА","ЖИРАФ","ЗАЯЦЬ","ЗЕБРА","ІГУАНА","ЇЖАК","КОРОВА","КУРКА","ЛЕВ","ЛИСИЦЯ","МАВПА","ПАНДА","ПЕС","ПІВЕНЬ","ПІНГВІН","СЛОН","СОРОКА","ТИГР","УДАВ","ФЛАМІНГО","ЧЕРЕПАХА"] },
    { n: "Їжа", e: "🍎", c: "#FFd6a5", words: ["ХЛІБ","СУП","РИС","ГРЕЧКА","ВІВСЯНКА","ВІДБИВНА","КОТЛЕТА","ТЕФТЕЛІ","РИБА","ЯЙЦЕ","СИР","МАКАРОНИ","ПІЦА","ПЕЧИВО","ЦУКЕРКИ","МОРОЗИВО","ОМЛЕТ"] },
    { n: "Частини тіла", e: "👂", c: "#FDffb6", words: ["ГОЛОВА","РУКА","НОГА","ОКО","НІС","РОТ","ВУХО","ЖИВІТ","СПИНА","ПАЛЕЦЬ","ВОЛОССЯ","ЗУБИ","ЛОБ","ПОПА","ЛІКОТЬ","ЩОКИ","ВІЇ","БРОВИ","КОЛІНО","СТОПА"] },
    { n: "Кольори", e: "🌈", c: "#CAffbf", words: ["ЧЕРВОНИЙ","СИНІЙ","ЖОВТИЙ","ЗЕЛЕНИЙ","БІЛИЙ","ЧОРНИЙ","РОЖЕВИЙ","ПОМАРАНЧЕВИЙ","ФІОЛЕТОВИЙ","КОРИЧНЕВИЙ"] },
    { n: "Цифри", e: "🔢", c: "#9Bf6ff", words: ["ОДИН","ДВА","ТРИ","ЧОТИРИ","П’ЯТЬ","ШІСТЬ","СІМ","ВІСІМ","ДЕВ’ЯТЬ","ДЕСЯТЬ","ОДИН ПЛЮС ОДИН ДОРІВНЮЄ ДВА"] },
    { n: "Сім'я", e: "👨‍👩‍👦", c: "#A0c4ff", words: ["МАМА","ТАТО","ДИТИНА","СИН","ДОНЬКА","БАБУСЯ","ДІДУСЬ","БРАТ","СЕСТРА","ДРУГ","ПОДРУГА"] },
    { n: "Напої", e: "🥤", c: "#Bdb2ff", words: ["ВОДА","СІК","ЧАЙ","МОЛОКО","КАКАО","КОМПОТ","КЕФІР","ЙОГУРТ"] },
    { n: "Фрукти/Овочі", e: "🍇", c: "#FfC6ff", words: ["ЯБЛУКО","БАНАН","ГРУША","ВИНОГРАД","ПОЛУНИЦЯ","ОГІРОК","ПОМІДОР","КАРТОПЛЯ","МОРКВА","КАПУСТА","КАВУН","ПЕРСИК","ЧЕРЕШНЯ","ЦИБУЛЯ","КРІП","ПЕТРУШКА"] },
    { n: "Емоції", e: "😊", c: "#FFadad", words: ["РАДІСТЬ","СУМ","ЗЛІСТЬ","СТРАХ","ЛЮБОВ","СМІХ","ПОЦІЛУНОК","ОБІЙМИ","СЛЬОЗИ","ОБРАЗА","САМОТНІСТЬ"] },
    { n: "Дієслова", e: "🏃", c: "#FFd6a5", words: ["БІГАТИ","СТРИБАТИ","ЇСТИ","ПИТИ","СПАТИ","ГРАТИ","МАЛЮВАТИ","ТАНЦЮВАТИ","МИТИ","ОДЯГАТИ","ПЛАВАТИ","ЗНІМАТИ","РАХУВАТИ","ПИСАТИ","НАДЯГАТИ","СИДІТИ","СТОЯТИ","ЧЕКАТИ","ДОПОМАГАТИ"] },
    { n: "Прикметники", e: "✨", c: "#FDffb6", words: ["ВЕЛИКИЙ","МАЛИЙ","ГАРНИЙ","ДОБРИЙ","ЗЛИЙ","ГАРЯЧИЙ","ХОЛОДНИЙ","МОКРИЙ","СУХИЙ","ШВИДКИЙ","ПОВІЛЬНИЙ","М’ЯКИЙ","ТВЕРДИЙ","ДОВГИЙ","КОРОТКИЙ","ВИСОКИЙ","НИЗЬКИЙ","ТОВСТИЙ","ХУДИЙ","СИЛЬНИЙ","СЛАБКИЙ"] },
    { n: "Місця", e: "🌳", c: "#CAffbf", words: ["ДІМ","ШКОЛА","САДОЧОК","МАГАЗИН","ПАРК","ЛІС","МОРЕ","ВУЛИЦЯ","МАЙДАНЧИК","БАСЕЙН","ПЛЯЖ","КІНОТЕАТР","КАФЕ","ЦИРК"] },
    { n: "Спорт", e: "⚽", c: "#9Bf6ff", words: ["М’ЯЧ","ФУТБОЛ","БІГ","ВЕЛОСИПЕД","САМОКАТ","РОЛИКИ","БАТУТ","ТЕНІС","ПЛАВАННЯ","БАСКЕТБОЛ"] },
    { n: "Іграшки", e: "🧸", c: "#A0c4ff", words: ["ЛЯЛЬКА","МАШИНКА","КУБИКИ","КОНСТРУКТОР","ПАЗЛИ","ВЕДМЕДИК","РОБОТ","ЛЕГО","ТРАКТОР","КНИЖКА"] },
    { n: "Дім", e: "🏠", c: "#Bdb2ff", words: ["ЛІЖКО","СТІЛ","СТІЛЬЧИК","ШАФА","ВІКНО","ДВЕРІ","ТЕЛЕВІЗОР","ХОЛОДИЛЬНИК","ДЗЕРКАЛО","ЛОЖКА","ВИЛКА","ЧАШКА","ТАРІЛКА","ПАТЕЛЬНЯ","КАСТРУЛЯ","ВАННА","ТУАЛЕТ","КОРИДОР","КУХНЯ","СПАЛЬНЯ","ЗАЛ","ЛАМПА","ЛЮСТРА"] },
    { n: "Транспорт", e: "🚗", c: "#FfC6ff", words: ["МАШИНА","АВТОБУС","ПОТЯГ","ЛІТАК","КОРАБЕЛЬ","ТРАМВАЙ","ТАКСІ","ВАНТАЖІВКА","ШВИДКА","ПОЖЕЖНА"] },
    { n: "Погода", e: "🌤", c: "#FFadad", words: ["СОНЦЕ","ДОЩ","СНІГ","ХМАРА","ВІТЕР","НЕБО","ГРІМ"] },
    { n: "Одяг", e: "👗", c: "#FFd6a5", words: ["ФУТБОЛКА","ШТАНИ","ШОРТИ","СУКНЯ","КУРТКА","ШАПКА","ШКАРПЕТКИ","ВЗУТТЯ","МАЙКА","ПАМПЕРС","ТРУСИ","КРОСІВКИ","СПІДНИЦЯ","КОЛГОТКИ"] },
    { n: "Час", e: "📅", c: "#FDffb6", words: ["РАНОК","ДЕНЬ","ВЕЧІР","НІЧ","ОСІНЬ","ЛІТО","ЗИМА","ВЕСНА"] },
    { n: "Різне", e: "🌀", c: "#CAffbf", words: ["МУЛЬТИКИ","ТАК","НІ","СТОП","ЩЕ","ДОПОМОЖИ","ДЯКУЮ","ТЕЛЕФОН","БУДЬ ЛАСКА"] }
];

let currentWords = [], wordIdx = 0, charIdx = 0, isPrize = false, isPaused = false;
const bgMusic = new Audio('bg_music.mp3'); bgMusic.loop = true;

const volMusic = document.getElementById('volume-music');
const volVoice = document.getElementById('volume-voice');
volMusic.oninput = (e) => bgMusic.volume = e.target.value;

function togglePause() {
    isPaused = !isPaused;
    const btn = document.getElementById('btn-pause');
    const screen = document.getElementById('game-screen');
    if (isPaused) { bgMusic.pause(); btn.innerText = "ГРАТИ"; btn.classList.add('paused'); screen.classList.add('game-paused'); }
    else { if(screen.style.display === 'flex') bgMusic.play(); btn.innerText = "ПАУЗА"; btn.classList.remove('paused'); screen.classList.remove('game-paused'); }
}

function init() {
    const lib = document.getElementById('library'); lib.innerHTML = '';
    categories.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'category-card' + (cat.words.length ? '' : ' locked');
        div.style.backgroundColor = cat.c;
        div.innerHTML = `<span>${cat.e}</span>${cat.n}`;
        div.onclick = () => { if(cat.words.length) { bgMusic.play(); startBlock(cat.words); } };
        lib.appendChild(div);
    });
}

function playSnd(name) {
    if (isPaused) return;
    const fileName = name.toUpperCase().replace('’', ''); 
    const audio = new Audio(fileName + '.m4a');
    audio.volume = volVoice.value;
    audio.play().catch(() => {
        const alt = new Audio(fileName + '.mp3');
        alt.volume = volVoice.value; alt.play().catch(() => {});
    });
}

function startBlock(words) {
    currentWords = [...words].sort(() => Math.random() - 0.5);
    wordIdx = 0; document.getElementById('library').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    nextWord();
}

function nextWord() {
    charIdx = 0; isPrize = false; render();
    setTimeout(() => playSnd(currentWords[wordIdx]), 300);
    setTimeout(() => playSnd(currentWords[wordIdx][0]), 1500);
}

function render() {
    const scr = document.getElementById('game-screen');
    scr.innerHTML = '<div id="word-display"></div>';
    const display = document.getElementById('word-display');
    currentWords[wordIdx].split('').forEach((l, i) => {
        const d = document.createElement('div'); d.className = 'tile';
        if (i < charIdx) d.classList.add('correct');
        if (i === charIdx) d.classList.add('active');
        d.innerText = l; display.appendChild(d);
    });
}

window.onkeydown = (e) => {
    if (isPaused) return;
    if (isPrize && (e.code === 'Space' || e.code === 'Enter')) { nextAction(); return; }
    if (document.getElementById('game-screen').style.display === 'flex' && !isPrize) {
        let key = e.key.toUpperCase();
        if (e.code === 'Quote') key = '’'; 
        
        const target = currentWords[wordIdx][charIdx];
        if (key === target) {
            charIdx++; render();
            if (charIdx === currentWords[wordIdx].length) {
                setTimeout(() => playSnd(currentWords[wordIdx]), 500);
                setTimeout(showPrize, 2000);
            } else { setTimeout(() => playSnd(currentWords[wordIdx][charIdx]), 400); }
        } else if (!['Shift','Alt','Control','CapsLock'].includes(e.key)) {
            const active = document.querySelector('.active');
            if(active) { active.classList.add('error'); setTimeout(() => active.classList.remove('error'), 400); }
        }
    }
};

function showPrize() {
    const word = currentWords[wordIdx];
    const imgFile = word.toUpperCase().replace('’', '').replace(/ /g, '') + '.jpg';
    document.getElementById('btn-space').style.display = 'none';
    document.getElementById('prize-img').src = imgFile;
    document.getElementById('prize-bg').style.backgroundImage = `url('${imgFile}')`;
    document.getElementById('prize-title').innerText = word;
    isPrize = true; document.getElementById('prize-overlay').style.display = 'flex';
    setTimeout(() => { if(isPri
